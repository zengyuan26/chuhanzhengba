<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>80后动画记忆馆</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS Custom Properties — Amber CRT Theme
   ============================================================ */
:root {
  --bg: #0d0d0d;
  --surface: rgba(20, 15, 5, 0.85);
  --amber: #ffb347;
  --amber-dark: #cc7a1f;
  --amber-glow: #ff8c00;
  --green: #39ff14;
  --text: #f5e6d3;
  --text-dim: #a89880;
  --card-bg: rgba(15, 10, 2, 0.9);
  --border-glow: rgba(255, 179, 71, 0.3);
  --domestic: #4da6ff;
  --imported: #ff8c42;
  --scanline-opacity: 0.06;
  --font-pixel: 'Press Start 2P', monospace;
  --font-mono: 'Courier New', 'Source Code Pro', monospace;
  --page-width: calc(100vw - 60px);
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  background: var(--bg);
  overflow: hidden;
  height: 100%;
}

body {
  font-family: var(--font-mono);
  color: var(--text);
  background: var(--bg);
  height: 100vh;
  overflow: hidden;
  position: relative;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: unset;
}

/* ============================================================
   CRT Scanline Overlay
   ============================================================ */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  mix-blend-mode: multiply;
}

/* CRT vignette */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
}

/* Noise overlay */
.noise {
  position: fixed; inset: 0; pointer-events: none; z-index: 9997;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* ============================================================
   Boot Screen Animation
   ============================================================ */
.boot-screen {
  position: fixed; inset: 0; z-index: 10000;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
}
.boot-screen.hidden {
  opacity: 0; visibility: hidden; pointer-events: none;
}
.boot-dot {
  width: 8px; height: 8px;
  background: #fff;
  border-radius: 50%;
  animation: bootPulse 1.2s ease-out forwards;
  box-shadow: 0 0 20px #fff, 0 0 60px #fff;
}
@keyframes bootPulse {
  0% { transform: scale(1); opacity: 1; }
  30% { transform: scale(25); opacity: 0.9; }
  60% { transform: scale(80); opacity: 0.3; }
  100% { transform: scale(120); opacity: 0; }
}
.boot-line {
  width: 60%;
  height: 2px;
  background: var(--amber);
  margin-top: 60px;
  opacity: 0;
  animation: bootLine 0.4s 0.8s ease-out forwards;
}
@keyframes bootLine {
  to { opacity: 1; width: 80%; }
}
.boot-text {
  font-family: var(--font-pixel);
  font-size: 0.7rem;
  color: var(--amber);
  margin-top: 20px;
  opacity: 0;
  animation: bootLine 0.5s 1.0s ease-out forwards;
}

/* ============================================================
   Header
   ============================================================ */
.header {
  position: relative;
  z-index: 10;
  padding: 16px 30px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  border-bottom: 1px solid rgba(255,179,71,0.2);
  background: rgba(10,8,3,0.95);
}

.title-group {
  display: flex; align-items: center; gap: 14px;
}
.title-main {
  font-family: var(--font-pixel);
  font-size: 1.3rem;
  color: var(--amber);
  position: relative;
  text-shadow:
    2px 0 rgba(255,0,0,0.4),
    -2px 0 rgba(0,255,255,0.4);
  animation: chromaticShift 4s infinite alternate;
}
@keyframes chromaticShift {
  0% { text-shadow: 2px 0 rgba(255,0,0,0.4), -2px 0 rgba(0,255,255,0.4); }
  100% { text-shadow: 3px 0 rgba(255,0,0,0.5), -3px 0 rgba(0,255,255,0.5); }
}
.title-sub {
  font-size: 0.65rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 2px;
}

/* Search & filters */
.controls {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.search-box {
  background: var(--card-bg);
  border: 1px solid var(--border-glow);
  color: var(--amber);
  padding: 8px 14px;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  width: 200px;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.search-box:focus {
  border-color: var(--amber);
  box-shadow: 0 0 12px rgba(255,179,71,0.3);
}
.search-box::placeholder { color: rgba(168,152,128,0.5); }

.filter-btn {
  background: transparent;
  border: 1px solid var(--border-glow);
  color: var(--text-dim);
  padding: 7px 14px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.25s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--amber); color: var(--amber); }
.filter-btn.active {
  background: var(--amber);
  color: #000;
  border-color: var(--amber);
  box-shadow: 0 0 15px rgba(255,179,71,0.4);
}

/* ============================================================
   Timeline Container — Horizontal Scroll Snap
   ============================================================ */
.timeline-wrapper {
  position: relative;
  z-index: 5;
  height: calc(100vh - 200px);
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  display: flex;
  padding: 20px 0;
}
.timeline-wrapper::-webkit-scrollbar { height: 6px; }
.timeline-wrapper::-webkit-scrollbar-track { background: #111; }
.timeline-wrapper::-webkit-scrollbar-thumb {
  background: var(--amber-dark); border-radius: 3px;
}

/* Each era page */
.era-page {
  min-width: var(--page-width);
  max-width: var(--page-width);
  height: 100%;
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  padding: 0 40px;
  flex-shrink: 0;
}

.era-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--amber);
  box-shadow: 0 2px 10px rgba(255,179,71,0.15);
}
.era-year {
  font-family: var(--font-pixel);
  font-size: 2.5rem;
  color: var(--amber);
  text-shadow: 0 0 30px rgba(255,179,71,0.5);
}
.era-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  letter-spacing: 3px;
}

/* Card grid within an era page */
.era-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 16px;
  flex: 1;
  align-content: start;
}

/* ============================================================
   Animation Card
   ============================================================ */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border-glow);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 180px;
}
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(255,179,71,0.08), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.card:hover {
  transform: translateY(-4px) scale(1.04);
  border-color: var(--amber);
  box-shadow: 0 0 30px rgba(255,179,71,0.3), inset 0 0 40px rgba(255,179,71,0.06);
}
.card:hover::after { opacity: 1; }

/* Card Cover */
.card-cover {
  height: 100px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.card-cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--cover-gradient, linear-gradient(135deg, #2a1a0a 0%, #4a2a10 50%, #1a0a00 100%));
}
.card-cover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  mix-blend-mode: multiply;
}
.card-cover-title {
  font-family: var(--font-pixel);
  font-size: 0.75rem;
  color: var(--amber);
  position: relative;
  z-index: 2;
  text-align: center;
  text-shadow: 0 0 20px rgba(255,179,71,0.5), 2px 2px 0 rgba(0,0,0,0.6);
  padding: 0 10px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-cover-icon {
  position: absolute;
  top: 8px; right: 10px;
  font-size: 1.5rem;
  opacity: 0.25;
  z-index: 2;
  filter: blur(0.5px);
}
.card-cover-year {
  position: absolute;
  bottom: 6px; left: 10px;
  font-family: var(--font-pixel);
  font-size: 0.5rem;
  color: var(--green);
  z-index: 2;
  opacity: 0.8;
}

/* Card info area below cover */
.card-info {
  padding: 10px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.card-title-zh {
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--amber);
  line-height: 1.3;
}
.card-title-en {
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-top: 2px;
  font-style: italic;
}
.card-badges {
  display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap;
  margin-top: 6px;
}
.badge {
  font-size: 0.55rem;
  padding: 2px 7px;
  border-radius: 2px;
  font-family: var(--font-mono);
  letter-spacing: 1px;
}
.badge-domestic { background: rgba(77,166,255,0.2); color: var(--domestic); border: 1px solid rgba(77,166,255,0.3); }
.badge-imported { background: rgba(255,140,66,0.2); color: var(--imported); border: 1px solid rgba(255,140,66,0.3); }

/* ============================================================
   Navigation Dots
   ============================================================ */
.nav-dots {
  position: fixed;
  bottom: 55px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 20;
}
.nav-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,179,71,0.25);
  border: 1px solid rgba(255,179,71,0.4);
  cursor: pointer;
  transition: all 0.3s;
}
.nav-dot.active {
  background: var(--amber);
  box-shadow: 0 0 12px var(--amber-glow);
  transform: scale(1.3);
}
.nav-dot:hover { border-color: var(--amber); }

.nav-arrows {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 30px;
  z-index: 20;
}
.nav-arrow {
  font-family: var(--font-pixel);
  font-size: 1.2rem;
  color: var(--amber);
  cursor: pointer;
  background: none;
  border: none;
  padding: 8px 16px;
  opacity: 0.6;
  transition: opacity 0.3s;
}
.nav-arrow:hover { opacity: 1; }

/* ============================================================
   Footer
   ============================================================ */
.footer {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  z-index: 10;
  padding: 10px 30px;
  background: rgba(10,8,3,0.95);
  border-top: 1px solid rgba(255,179,71,0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.7rem;
  color: var(--text-dim);
}
.footer-stat { color: var(--amber); }

.year-bar {
  display: flex; gap: 3px; align-items: center;
}
.year-bar-seg {
  height: 4px; border-radius: 2px;
  transition: width 0.5s;
}

/* ============================================================
   Modal / Detail Overlay
   ============================================================ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: opacity 0.35s, visibility 0.35s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }

.modal {
  background: #0f0b05;
  border: 2px solid var(--amber);
  border-radius: 6px;
  width: 90vw;
  max-width: 800px;
  max-height: 85vh;
  overflow-y: auto;
  position: relative;
  box-shadow:
    0 0 60px rgba(255,179,71,0.2),
    0 0 120px rgba(255,179,71,0.08),
    inset 0 0 60px rgba(255,179,71,0.03);
  transform: scale(0.9);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.modal-overlay.open .modal { transform: scale(1); }

.modal-close {
  position: sticky;
  top: 12px;
  float: right;
  z-index: 10;
  width: 36px; height: 36px;
  background: var(--card-bg);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-size: 1.2rem;
  cursor: pointer;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
  margin-right: 12px;
}
.modal-close:hover {
  background: var(--amber);
  color: #000;
  box-shadow: 0 0 20px rgba(255,179,71,0.5);
}

.modal-body { padding: 20px 30px 30px; clear: both; }

.modal-title-zh {
  font-family: var(--font-pixel);
  font-size: 1.2rem;
  color: var(--amber);
  text-shadow: 0 0 20px rgba(255,179,71,0.4);
  margin-bottom: 4px;
}
.modal-title-en {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 4px;
}
.modal-meta {
  display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.modal-meta span {
  font-size: 0.7rem;
  padding: 3px 10px;
  border: 1px solid var(--border-glow);
  border-radius: 2px;
  color: var(--text-dim);
}

/* Tabs */
.modal-tabs {
  display: flex; gap: 0; margin-bottom: 20px;
  border-bottom: 1px solid rgba(255,179,71,0.2);
}
.modal-tab {
  padding: 10px 22px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.3s;
}
.modal-tab.active {
  color: var(--amber);
  border-bottom-color: var(--amber);
}
.modal-tab:hover { color: var(--amber); }

.modal-pane { display: none; }
.modal-pane.active { display: block; }

.modal-pane h3 {
  font-family: var(--font-pixel);
  font-size: 0.7rem;
  color: var(--amber);
  margin-bottom: 12px;
  letter-spacing: 2px;
}
.modal-pane p {
  font-size: 0.85rem;
  line-height: 1.8;
  color: var(--text);
  text-align: justify;
}

/* Character cards */
.char-card {
  background: var(--card-bg);
  border: 1px solid var(--border-glow);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 12px;
}
.char-name {
  font-size: 0.95rem;
  color: var(--amber);
  font-weight: bold;
  margin-bottom: 6px;
}
.char-desc {
  font-size: 0.8rem;
  color: var(--text);
  line-height: 1.6;
}

/* Video pane */
.video-container {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  border-radius: 4px;
  border: 1px solid var(--border-glow);
  background: #000;
}
.video-container iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.video-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  border: 1px dashed var(--border-glow);
  border-radius: 4px;
}

/* ============================================================
   No results
   ============================================================ */
.no-results {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 40vh;
  color: var(--text-dim);
  font-family: var(--font-pixel);
  font-size: 0.8rem;
  gap: 12px;
  text-align: center;
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 1024px) {
  :root { --page-width: 90vw; }
  .era-grid { grid-template-columns: repeat(3, 1fr); }
  .title-main { font-size: 1rem; }
  .era-year { font-size: 1.8rem; }
}

@media (max-width: 768px) {
  :root { --page-width: 100vw; }
  .header { padding: 12px 16px; }
  .title-main { font-size: 0.8rem; }
  .timeline-wrapper {
    height: auto;
    overflow-x: hidden;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    flex-direction: column;
    padding: 10px 0;
  }
  .era-page {
    min-width: 100%;
    max-width: 100%;
    scroll-snap-align: start;
    padding: 0 16px;
    margin-bottom: 20px;
  }
  .era-grid { grid-template-columns: 1fr; grid-auto-rows: auto; }
  .nav-dots, .nav-arrows { display: none; }
  .search-box { width: 120px; }
  .filter-btn { padding: 5px 10px; font-size: 0.65rem; }
  .modal { width: 95vw; max-height: 90vh; }
  .era-year { font-size: 1.4rem; }
}

/* CRT screen flicker — subtle, random via animation delay trick */
@keyframes flicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.97; }
}
body { animation: flicker 8s infinite; }
</style>
</head>
<body>

<!-- Boot Screen -->
<div class="boot-screen" id="bootScreen">
  <div class="boot-dot"></div>
  <div class="boot-line"></div>
  <div class="boot-text">CHANNEL 80s · 信号接入中...</div>
</div>

<div class="noise"></div>

<!-- Header -->
<header class="header">
  <div class="title-group">
    <span class="title-main">80后动画记忆馆</span>
    <span class="title-sub">1980 → 2000</span>
  </div>
  <div class="controls">
    <input type="text" class="search-box" id="searchInput" placeholder="搜索动画名称或年份...">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="domestic">国产</button>
    <button class="filter-btn" data-filter="imported">引进</button>
    <button class="filter-btn" data-filter="1980s">1980s</button>
    <button class="filter-btn" data-filter="1990s">1990s</button>
    <button class="filter-btn" data-filter="2000s">2000s</button>
  </div>
</header>

<!-- Timeline -->
<div class="timeline-wrapper" id="timeline"></div>

<!-- Nav Dots -->
<div class="nav-dots" id="navDots"></div>

<!-- Footer -->
<footer class="footer">
  <span>共收录 <span class="footer-stat" id="totalCount">0</span> 部经典动画</span>
  <div class="year-bar" id="yearBar"></div>
  <span>SINCE 1980 — 2000</span>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ============================================================
// Animation Data — 50+ entries
// ============================================================
const animations = [
  // ── 1980 ──
  { id:1, year:1980, title:"铁臂阿童木", titleEn:"Astro Boy", country:"日本", type:"imported",
    decade:"1980s",
    synopsis:"天马博士的儿子因车祸去世，悲痛之下创造了机器人阿童木。阿童木拥有10万马力的力量和善良的心灵，在茶水博士的帮助下，他开始了与邪恶势力斗争、保护人类的旅程。这是中国引进的第一部日本电视动画，开启了中日动画交流的大门。",
    characters:[

// ============================================================
// Boot Animation
// ============================================================
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('bootScreen').classList.add('hidden');
  }, 1600);
});

// ============================================================
// State
// ============================================================
let currentFilter = 'all';
let currentSearch = '';

// Group animations by era for timeline pages
function getEraPages(anims) {
  const groups = [
    { label: '1980 — 1984', years: [1980,1984], key: 'era-80a' },
    { label: '1985 — 1989', years: [1985,1989], key: 'era-80b' },
    { label: '1990 — 1994', years: [1990,1994], key: 'era-90a' },
    { label: '1995 — 1999', years: [1995,1999], key: 'era-90b' },
    { label: '2000', years: [2000,2000], key: 'era-00' }
  ];
  const pages = [];
  const valid = filterAnims(anims, currentFilter, currentSearch);

  groups.forEach(g => {
    const members = valid
      .filter(a => a.year >= g.years[0] && a.year <= g.years[1])
      .sort((a,b) => a.year - b.year);
    if (members.length > 0) {
      pages.push({ ...g, members });
    }
  });

  return pages;
}

// ============================================================
// Render Timeline
// ============================================================
function renderTimeline() {
  const wrapper = document.getElementById('timeline');
  const pages = getEraPages(animations);
  const isMobile = window.innerWidth <= 768;

  let html = '';

  pages.forEach((page, pi) => {
    const eraLabel = page.label.includes('—') ? 'ERA' : 'YEAR';
    html += `<div class="era-page" data-era="${page.key}">`;
    html += `<div class="era-header">`;
    html += `<span class="era-year">${page.label}</span>`;
    html += `<span class="era-label">${eraLabel}</span>`;
    html += `</div>`;
    html += `<div class="era-grid">`;

    page.members.forEach(anim => {
      const typeBadge = anim.type === 'domestic'
        ? '<span class="badge badge-domestic">国产</span>'
        : '<span class="badge badge-imported">引进</span>';
      const countryBadge = `<span class="badge" style="border:1px solid rgba(255,179,71,0.3);color:#a89880;">${anim.country}</span>`;
      const hue = (anim.id * 47) % 360;
      const coverGrad = `linear-gradient(135deg, hsl(${hue},30%,12%) 0%, hsl(${hue},45%,18%) 40%, hsl(${(hue+30)%360},25%,8%) 100%)`;
      const icons = ['📺','🎬','🎨','✨','🌟','💫','🎪','🎭','📡','🔮','🎯','🎵','🎶','🖼️','📼','🌀'];
      const icon = icons[anim.id % icons.length];

      html += `
        <div class="card" data-id="${anim.id}" onclick="openModal(${anim.id})">
          <div class="card-cover" style="--cover-gradient:${coverGrad};">
            <span class="card-cover-icon">${icon}</span>
            <span class="card-cover-title">${anim.title}</span>
            <span class="card-cover-year">◆ ${anim.year}</span>
          </div>
          <div class="card-info">
            <div>
              <div class="card-title-zh">${anim.title}</div>
              <div class="card-title-en">${anim.titleEn}</div>
            </div>
            <div class="card-badges">${typeBadge}${countryBadge}</div>
          </div>
        </div>`;
    });

    html += `</div></div>`;
  });

  wrapper.innerHTML = html;

  // Update nav dots
  renderNavDots(pages.length);

  // Update footer stats
  updateStats(pages);

  // Show/hide no results
  const noRes = document.getElementById('noResults');
  if (pages.length === 0) {
    if (!noRes) {
      const div = document.createElement('div');
      div.id = 'noResults';
      div.className = 'no-results';
      div.style.display = 'flex';
      div.innerHTML = '<span>NO SIGNAL</span><span>没有找到匹配的动画 · 试试其他筛选条件</span>';
      wrapper.parentNode.insertBefore(div, wrapper.nextSibling);
    } else {
      noRes.style.display = 'flex';
    }
    wrapper.style.display = 'none';
  } else {
    if (noRes) noRes.style.display = 'none';
    wrapper.style.display = 'flex';
  }

  // Scroll to first page
  wrapper.scrollLeft = 0;
}

// ============================================================
// Nav Dots
// ============================================================
function renderNavDots(count) {
  const dots = document.getElementById('navDots');
  if (count <= 1) { dots.innerHTML = ''; return; }

  let html = '';
  for (let i = 0; i < count; i++) {
    html += `<div class="nav-dot${i === 0 ? ' active' : ''}" data-index="${i}"></div>`;
  }
  dots.innerHTML = html;

  // Click handlers
  dots.querySelectorAll('.nav-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const idx = parseInt(dot.dataset.index);
      const pages = document.querySelectorAll('.era-page');
      if (pages[idx]) {
        pages[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
      }
    });
  });
}

// ============================================================
// Track active page on scroll
// ============================================================
const timelineEl = document.getElementById('timeline');
timelineEl.addEventListener('scroll', () => {
  const pages = document.querySelectorAll('.era-page');
  const dots = document.querySelectorAll('.nav-dot');
  if (pages.length === 0 || dots.length === 0) return;

  const containerLeft = timelineEl.getBoundingClientRect().left;
  let activeIdx = 0;
  let minDist = Infinity;

  pages.forEach((page, i) => {
    const rect = page.getBoundingClientRect();
    const dist = Math.abs(rect.left - containerLeft);
    if (dist < minDist) { minDist = dist; activeIdx = i; }
  });

  dots.forEach((d, i) => d.classList.toggle('active', i === activeIdx));
});

// ============================================================
// Keyboard Navigation
// ============================================================
document.addEventListener('keydown', (e) => {
  if (document.getElementById('modalOverlay').classList.contains('open')) return;
  if (document.activeElement === document.getElementById('searchInput')) return;

  const pages = document.querySelectorAll('.era-page');
  if (pages.length === 0) return;

  const containerLeft = timelineEl.getBoundingClientRect().left;
  let currentIdx = 0;
  let minDist = Infinity;
  pages.forEach((page, i) => {
    const dist = Math.abs(page.getBoundingClientRect().left - containerLeft);
    if (dist < minDist) { minDist = dist; currentIdx = i; }
  });

  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    const next = Math.min(currentIdx + 1, pages.length - 1);
    pages[next].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = Math.max(currentIdx - 1, 0);
    pages[prev].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
  }
});

// ============================================================
// Search
// ============================================================
document.getElementById('searchInput').addEventListener('input', (e) => {
  currentSearch = e.target.value.trim().toLowerCase();
  renderTimeline();
});

// ============================================================
// Filters
// ============================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTimeline();
  });
});

// ============================================================
// Filter Logic
// ============================================================
function filterAnims(anims, filter, search) {
  return anims.filter(a => {
    // Filter
    if (filter === 'domestic' && a.type !== 'domestic') return false;
    if (filter === 'imported' && a.type !== 'imported') return false;
    if (filter === '1980s' && a.decade !== '1980s') return false;
    if (filter === '1990s' && a.decade !== '1990s') return false;
    if (filter === '2000s' && a.decade !== '2000s') return false;

    // Search
    if (search) {
      const haystack = `${a.title} ${a.titleEn} ${a.year} ${a.country} ${a.synopsis}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }

    return true;
  });
}

// ============================================================
// Footer Stats
// ============================================================
function updateStats(pages) {
  const total = pages.reduce((sum, p) => sum + p.members.length, 0);
  document.getElementById('totalCount').textContent = total;

  // Year distribution bar
  const bar = document.getElementById('yearBar');
  const allDecades = { '1980s': 0, '1990s': 0, '2000s': 0 };
  pages.forEach(p => {
    p.members.forEach(a => {
      if (allDecades.hasOwnProperty(a.decade)) allDecades[a.decade]++;
    });
  });
  const maxCount = Math.max(...Object.values(allDecades), 1);
  const colors = { '1980s': '#ff8c42', '1990s': '#ffb347', '2000s': '#ffd700' };
  bar.innerHTML = Object.entries(allDecades).map(([d, c]) => {
    const w = Math.max((c / maxCount) * 80, 8);
    return `<span class="year-bar-seg" style="width:${w}px;background:${colors[d]};" title="${d}: ${c}部"></span>`;
  }).join('');
}

// ============================================================
// Modal
// ============================================================
const modalOverlay = document.getElementById('modalOverlay');
const modalBody = document.getElementById('modalBody');
const modalClose = document.getElementById('modalClose');

function openModal(id) {
  const anim = animations.find(a => a.id === id);
  if (!anim) return;

  const typeLabel = anim.type === 'domestic' ? '国产' : '引进';
  const typeCls = anim.type === 'domestic' ? 'badge-domestic' : 'badge-imported';

  // Characters HTML
  let charsHTML = '';
  if (anim.characters && anim.characters.length > 0) {
    charsHTML = anim.characters.map(c => `
      <div class="char-card">
        <div class="char-name">${c.name}</div>
        <div class="char-desc">${c.desc}</div>
      </div>
    `).join('');
  } else {
    charsHTML = '<p style="color:var(--text-dim);">资料收集中...</p>';
  }

  // Video HTML
  let videoHTML = '';
  if (anim.videoUrl && anim.videoUrl.trim()) {
    videoHTML = `<div class="video-container"><iframe src="${anim.videoUrl}" allowfullscreen allow="autoplay"></iframe></div>`;
  } else {
    videoHTML = `<div class="video-placeholder">
      <span>📺 经典片段采集中 · 敬请期待</span>
    </div>`;
  }

  modalBody.innerHTML = `
    <div class="modal-title-zh">${anim.title}</div>
    <div class="modal-title-en">${anim.titleEn}</div>
    <div class="modal-meta">
      <span>${anim.year}</span>
      <span class="badge ${typeCls}" style="font-size:0.7rem;">${typeLabel}</span>
      <span>${anim.country}</span>
    </div>

    <div class="modal-tabs">
      <button class="modal-tab" data-pane="video">经典片段</button>
      <button class="modal-tab" data-pane="synopsis">故事简介</button>
      <button class="modal-tab" data-pane="characters">主角介绍</button>
    </div>

    <div class="modal-pane active" data-pane="video">
      ${videoHTML}
    </div>
    <div class="modal-pane" data-pane="synopsis">
      <p>${anim.synopsis}</p>
    </div>
    <div class="modal-pane" data-pane="characters">
      ${charsHTML}
    </div>
  `;

  // Tab switching
  modalBody.querySelectorAll('.modal-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const pane = tab.dataset.pane;
      modalBody.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
      modalBody.querySelectorAll('.modal-pane').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      modalBody.querySelector(`.modal-pane[data-pane="${pane}"]`).classList.add('active');
    });
  });

  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
  modalBody.innerHTML = '';
}

modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalOverlay.classList.contains('open')) {
    closeModal();
  }
});

// ============================================================
// Initial Render
// ============================================================
renderTimeline();

// Re-render on resize (for mobile vs desktop layout switch)
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(renderTimeline, 250);
});
</script>
