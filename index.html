<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>80后动画记忆馆 — 放学回家 · 打开电视</title>
<style>
:root {
  --amber: #ff9d20;
  --amber-dim: #8b6018;
  --green: #2dff0d;
  --text: #ffe8c8;
  --text-dim: #998870;
  --font-pixel: 'Press Start 2P', monospace;
  --font-mono: 'Courier New', monospace;
  --font-serif: 'Noto Serif SC', 'KaiTi', serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;background:#000;overflow:hidden;height:100%}
body{height:100vh;overflow:hidden;background:#000;font-family:var(--font-mono);color:var(--text);cursor:none}

#threeCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

#tvScreenOverlay{
  position:fixed;z-index:5;overflow:hidden;background:#000;
  border-radius:6px;
  box-shadow:inset 0 0 80px rgba(0,0,0,.85),inset 0 0 0 3px rgba(0,0,0,.6);
  pointer-events:auto;cursor:default;
}
#tvScreenOverlay iframe{
  position:absolute;top:-42px;left:0;
  width:100%;height:calc(100% + 84px);border:none;
}

/* CRT screen effects — CSS only on video overlay, NOT full screen */
#crtScanlines{
  position:absolute;top:0;right:0;bottom:0;left:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 3px);
}
#crtVignette{
  position:absolute;top:0;right:0;bottom:0;left:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(0,0,0,.15) 55%,rgba(0,0,0,.35) 75%,rgba(0,0,0,.65) 100%);
}
#crtNoise{
  position:absolute;top:0;right:0;bottom:0;left:0;pointer-events:none;z-index:3;opacity:.06;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:noiseAnim .12s steps(3) infinite;
}
@keyframes noiseAnim{0%{opacity:.04}33%{opacity:.07}66%{opacity:.03}100%{opacity:.06}}

#snowOverlay{
  position:absolute;top:0;right:0;bottom:0;left:0;z-index:10;
  pointer-events:none;opacity:0;background:#000;
}
#snowOverlay.active{opacity:1;animation:crtSnowBurst .65s steps(8) forwards}
@keyframes crtSnowBurst{
  0%{background:#fff;filter:brightness(3.5) contrast(5) blur(3px) saturate(0)}
  15%{background:#000;filter:brightness(.1) contrast(6) blur(1px) saturate(0)}
  30%{background:#888;filter:brightness(2.5) contrast(4) blur(5px) saturate(0)}
  50%{background:#222;filter:brightness(.4) contrast(3) blur(2px) saturate(0)}
  65%{background:#fff;filter:brightness(1.8) contrast(5) blur(4px) saturate(0)}
  80%{background:#050505;filter:brightness(.7) contrast(1.8) blur(1px) saturate(0)}
  100%{background:#000;filter:brightness(1) contrast(1) blur(0) saturate(1);opacity:0}
}

#channelWatermark{
  position:absolute;top:8px;right:10px;z-index:5;pointer-events:none;
  font-family:var(--font-pixel);font-size:.5rem;color:rgba(238,153,32,.55);
}
#screenClock{
  position:absolute;top:8px;left:10px;z-index:5;pointer-events:none;
  font-family:var(--font-mono);font-size:.5rem;color:rgba(45,255,13,.55);
}
#npInfo{
  position:absolute;bottom:0;left:0;right:0;z-index:5;pointer-events:none;
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;background:rgba(5,4,2,.85);
  font-family:var(--font-pixel);font-size:.48rem;
}
.np-ch{color:var(--green)}
.np-title{color:var(--amber);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-year{color:var(--text-dim);font-size:.4rem;font-family:var(--font-mono)}
.np-badge{font-size:.38rem;padding:2px 5px;border-radius:2px}

#noSignalOverlay{
  position:absolute;top:0;right:0;bottom:0;left:0;z-index:8;
  display:none;align-items:center;justify-content:center;
  background:#1a1a1a;flex-direction:column;
}
#noSignalOverlay.visible{display:flex}
#testPattern{
  width:72%;aspect-ratio:4/3;
  background:linear-gradient(180deg,
    #bfbfbf 0%,#bfbfbf 4%,#ffff00 4%,#ffff00 11%,
    #0ff 11%,#0ff 18%,#0f0 18%,#0f0 25%,
    #f0f 25%,#f0f 32%,#f00 32%,#f00 39%,
    #00f 39%,#00f 46%,#000 46%,#000 53%,
    #111 53%,#f0f0f0 61%,#111 66%,#222 80%,#111 100%);
  border-radius:6px;position:relative;
  box-shadow:0 0 40px rgba(255,255,255,.06);
}
#testPattern::before{
  content:'';position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);
  width:55%;height:38%;border:3px solid rgba(255,255,255,.65);border-radius:50%;
}
#testPattern::after{
  content:'';position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);
  width:5%;height:5%;background:rgba(255,255,255,.5);
}

#modalOverlay{
  position:absolute;top:0;right:0;bottom:0;left:0;z-index:20;
  background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:opacity .35s;
}
#modalOverlay.open{opacity:1;visibility:visible}
#modalBox{
  background:#0d0a04;border:2px solid var(--amber);border-radius:6px;
  width:88%;max-height:80%;overflow-y:auto;
  box-shadow:0 0 40px rgba(238,153,32,.15);
  transform:scale(.9);transition:transform .35s;
}
#modalOverlay.open #modalBox{transform:scale(1)}
#modalClose{
  position:sticky;top:8px;float:right;z-index:5;margin-right:8px;
  width:30px;height:30px;background:#0d0a04;border:1px solid var(--amber);
  color:var(--amber);font-size:1rem;cursor:pointer;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
#modalClose:hover{background:var(--amber);color:#000}
#modalBody{padding:14px 22px 22px;clear:both}
.modal-title{font-family:var(--font-pixel);font-size:.9rem;color:var(--amber);margin-bottom:2px}
.modal-meta{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.modal-meta span{font-size:.55rem;padding:2px 7px;border:1px solid rgba(238,153,32,.2);border-radius:2px;color:var(--text-dim)}
.modal-tabs{display:flex;margin-bottom:12px;border-bottom:1px solid rgba(238,153,32,.15)}
.modal-tab{padding:7px 14px;font-size:.6rem;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.modal-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.modal-pane{display:none;font-size:.7rem;line-height:1.7;color:var(--text)}
.modal-pane.active{display:block}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:3px;background:#000}
.video-wrap iframe{position:absolute;top:-42px;left:0;width:100%;height:calc(100% + 84px);border:none}

#newspaper{
  position:absolute;bottom:0;left:0;right:0;z-index:15;
  pointer-events:none;opacity:0;transform:translateY(100%);
  transition:all .35s;
  background:linear-gradient(180deg,#f5edd5,#e8dbb8);
  border-top:4px double #8b7355;padding:10px 14px;max-height:42%;overflow-y:auto;
  font-family:var(--font-serif);color:#3a2a1a;
}
#newspaper.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.np-header{text-align:center;border-bottom:2px solid #8b7355;padding-bottom:5px;margin-bottom:6px}
.np-title-text{font-size:.8rem;font-weight:bold;letter-spacing:3px}
.np-date{font-size:.45rem;color:#8b7355}
.np-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:2px}
.np-item{font-size:.5rem;padding:3px 5px;border-bottom:1px dotted #c4a97d;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-item:hover{background:rgba(139,115,85,.15)}
.np-time{color:#8b7355;font-size:.4rem;margin-right:3px}

#customCursor{
  position:fixed;pointer-events:none;z-index:999;
  width:24px;height:24px;
  border:2px solid rgba(238,153,32,.7);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width .15s,height .15s,border-color .15s;
  mix-blend-mode:difference;
}
#customCursor.hovering{width:32px;height:32px;border-color:var(--amber);background:rgba(238,153,32,.1)}
#cursorDot{
  position:fixed;pointer-events:none;z-index:998;
  width:4px;height:4px;background:var(--amber);border-radius:50%;
  transform:translate(-50%,-50%);
}

#bootOverlay{
  position:fixed;top:0;right:0;bottom:0;left:0;z-index:1000;
  background:#000;display:flex;align-items:center;justify-content:center;
  flex-direction:column;transition:opacity .8s;
}
#bootOverlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.boot-text{
  font-family:var(--font-pixel);font-size:1.2rem;color:var(--amber);
  opacity:0;transform:scale(.5);transition:all .8s;
}
.boot-text.show{opacity:1;transform:scale(1)}
.boot-sub{font-size:.55rem;color:var(--green);margin-top:14px;opacity:0;transition:opacity .5s}
.boot-sub.show{opacity:1}
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>

<div id="customCursor"></div>
<div id="cursorDot"></div>

<div id="bootOverlay">
  <div class="boot-text" id="bootText">欢 迎 来 到<br>八 十 年 代</div>
  <div class="boot-sub" id="bootSub">CHANNEL 80s · 童年记忆已接通</div>
</div>

<div id="tvScreenOverlay">
  <div id="crtNoise"></div>
  <div id="crtVignette"></div>
  <div id="crtScanlines"></div>
  <div id="snowOverlay"></div>
  <div id="channelWatermark">80s TV</div>
  <div id="screenClock"></div>
  <div id="npVideo" style="position:absolute;top:0;right:0;bottom:0;left:0;">
    <div style="position:absolute;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;color:rgba(255,232,200,.4);font-family:var(--font-mono);font-size:.7rem;pointer-events:none;">旋转旋钮换台</div>
  </div>
  <div id="npPreload" style="position:absolute;top:0;right:0;bottom:0;left:0;visibility:hidden;pointer-events:none;"></div>
  <div id="npInfo">
    <span class="np-ch" id="npChannelNum">CH 2</span>
    <span class="np-title" id="npTitle"></span>
    <span class="np-year" id="npYear"></span>
    <span class="np-badge" id="npBadge"></span>
  </div>
  <div id="noSignalOverlay"><div id="testPattern"></div></div>
  <div id="modalOverlay">
    <div id="modalBox">
      <button id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>
  <div id="newspaper">
    <div class="np-header">
      <div class="np-title-text">📰 下周节目预告</div>
      <div class="np-date" id="npDate">1990年6月1日 儿童节特辑</div>
    </div>
    <div class="np-grid" id="npGrid"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ============================================================
// THREE.JS SCENE SETUP
// ============================================================
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.LinearToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1008');

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 20);
camera.position.set(0, 0.9, 2.8);
camera.lookAt(0, -0.1, 0);

// ============================================================
// LIGHTING
// ============================================================
const hemiLight = new THREE.HemisphereLight('#ffe8d0', '#4a3828', 2.5);
scene.add(hemiLight);

const ambient = new THREE.AmbientLight('#ffffff', 1.8);
scene.add(ambient);

const ceilingLight = new THREE.PointLight('#fff5e0', 80, 8, 0.5);
ceilingLight.position.set(0, 2.3, 0.8);
scene.add(ceilingLight);

const tvGlow = new THREE.PointLight('#ff9d20', 30, 5, 0.5);
tvGlow.position.set(0, 0.25, 1.15);
scene.add(tvGlow);

const fillLight = new THREE.PointLight('#ffe0c0', 15, 4, 0.8);
fillLight.position.set(1.8, 0.6, 2.2);
scene.add(fillLight);

// ============================================================
// ROOM GEOMETRY — Phong materials, no shadows
// ============================================================
const roomGroup = new THREE.Group();
scene.add(roomGroup);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(5, 5),
  new THREE.MeshPhongMaterial({color:'#6b4c3a', specular:'#111111', shininess:5})
);
floor.rotation.x = -Math.PI/2;
floor.position.y = -1.2;
roomGroup.add(floor);

const wallMat = new THREE.MeshPhongMaterial({color:'#f5ecd7', specular:'#000000', shininess:0});
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(5, 3.5), wallMat);
backWall.position.set(0, 0.55, -2.5);
roomGroup.add(backWall);

const sideWallMat = new THREE.MeshPhongMaterial({color:'#ede4d0', specular:'#000000', shininess:0});
const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(5, 3.5), sideWallMat);
leftWall.position.set(-2.5, 0.55, 0);
leftWall.rotation.y = Math.PI/2;
roomGroup.add(leftWall);

const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(5, 3.5), sideWallMat);
rightWall.position.set(2.5, 0.55, 0);
rightWall.rotation.y = -Math.PI/2;
roomGroup.add(rightWall);

const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(5, 5),
  new THREE.MeshPhongMaterial({color:'#faf7f0', specular:'#000000', shininess:0})
);
ceiling.position.set(0, 2.3, 0);
ceiling.rotation.x = Math.PI/2;
roomGroup.add(ceiling);

const wainscot = new THREE.Mesh(
  new THREE.BoxGeometry(5, 1.2, 0.02),
  new THREE.MeshPhongMaterial({color:'#7a9a82', specular:'#111111', shininess:3})
);
wainscot.position.set(0, -0.6, -2.49);
roomGroup.add(wainscot);

const baseboard = new THREE.Mesh(
  new THREE.BoxGeometry(5, 0.06, 0.03),
  new THREE.MeshPhongMaterial({color:'#3a2818', specular:'#000000', shininess:0})
);
baseboard.position.set(0, -0.55, -2.49);
roomGroup.add(baseboard);

// ============================================================
// TV CABINET
// ============================================================
const cabinetGroup = new THREE.Group();
cabinetGroup.position.set(0, -0.85, 1.3);
scene.add(cabinetGroup);

const cabinet = new THREE.Mesh(
  new THREE.BoxGeometry(1.6, 0.35, 0.5),
  new THREE.MeshPhongMaterial({color:'#6B5340', specular:'#222222', shininess:10})
);
cabinet.position.y = -0.175;
cabinetGroup.add(cabinet);

const cabinetTop = new THREE.Mesh(
  new THREE.BoxGeometry(1.62, 0.02, 0.52),
  new THREE.MeshPhongMaterial({color:'#8B7355', specular:'#444444', shininess:20})
);
cabinetTop.position.y = 0.01;
cabinetGroup.add(cabinetTop);

for (let lx of [-0.65, 0.65]) {
  const leg = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.04, 0.3, 8),
    new THREE.MeshPhongMaterial({color:'#3a2a18', specular:'#111111', shininess:5})
  );
  leg.position.set(lx, -0.48, 0.18);
  cabinetGroup.add(leg);
  const leg2 = leg.clone();
  leg2.position.z = -0.18;
  cabinetGroup.add(leg2);
}

// ============================================================
// CRT TV MODEL
// ============================================================
const tvGroup = new THREE.Group();
tvGroup.position.set(0, -0.28, 1.38);
scene.add(tvGroup);

const tvBody = new THREE.Mesh(
  new THREE.BoxGeometry(1.1, 0.78, 0.55),
  new THREE.MeshPhongMaterial({color:'#5c4535', specular:'#222222', shininess:15})
);
tvGroup.add(tvBody);

const frontPanel = new THREE.Mesh(
  new THREE.BoxGeometry(1.06, 0.74, 0.02),
  new THREE.MeshPhongMaterial({color:'#1a1410', specular:'#333333', shininess:25})
);
frontPanel.position.z = 0.275;
tvGroup.add(frontPanel);

const bezelOuter = new THREE.Mesh(
  new THREE.BoxGeometry(0.82, 0.64, 0.04),
  new THREE.MeshPhongMaterial({color:'#0a0a0a', specular:'#444444', shininess:30})
);
bezelOuter.position.z = 0.28;
tvGroup.add(bezelOuter);

// Screen — emissive gives Bloom source
const screenMat = new THREE.MeshPhongMaterial({
  color:'#000000', emissive:'#ff9d20', emissiveIntensity:0.5,
  specular:'#000000', shininess:0
});
const tvScreen = new THREE.Mesh(new THREE.PlaneGeometry(0.72, 0.54), screenMat);
tvScreen.position.z = 0.302;
tvScreen.name = 'tvScreen';
tvGroup.add(tvScreen);

const controlPanel = new THREE.Mesh(
  new THREE.BoxGeometry(1.08, 0.09, 0.03),
  new THREE.MeshPhongMaterial({color:'#0d0a06', specular:'#444444', shininess:20})
);
controlPanel.position.set(0, -0.37, 0.275);
tvGroup.add(controlPanel);

// ── Knob ──
const knobGroup = new THREE.Group();
knobGroup.position.set(-0.32, -0.38, 0.3);
knobGroup.name = 'knobGroup';
tvGroup.add(knobGroup);

const knobBase = new THREE.Mesh(
  new THREE.CylinderGeometry(0.07, 0.075, 0.04, 32),
  new THREE.MeshPhongMaterial({color:'#1a1a1a', specular:'#888888', shininess:40})
);
knobGroup.add(knobBase);

const knobGrip = new THREE.Mesh(
  new THREE.CylinderGeometry(0.06, 0.065, 0.05, 24),
  new THREE.MeshPhongMaterial({color:'#333333', specular:'#999999', shininess:50})
);
knobGrip.position.z = 0.025;
knobGrip.name = 'knobGrip';
knobGroup.add(knobGrip);

const knobIndicator = new THREE.Mesh(
  new THREE.BoxGeometry(0.01, 0.025, 0.01),
  new THREE.MeshPhongMaterial({color:'#ff9d20', emissive:'#ff9d20', emissiveIntensity:1.5,
    specular:'#000000', shininess:0})
);
knobIndicator.position.set(0, 0.055, 0.028);
knobGroup.add(knobIndicator);

const chLabel = new THREE.Mesh(
  new THREE.PlaneGeometry(0.06, 0.03),
  new THREE.MeshBasicMaterial({color:'#ff9d20'})
);
chLabel.position.set(-0.42, -0.38, 0.31);
tvGroup.add(chLabel);

const powerLed = new THREE.Mesh(
  new THREE.SphereGeometry(0.018, 8, 8),
  new THREE.MeshPhongMaterial({color:'#00ff00', emissive:'#00ff00', emissiveIntensity:3,
    specular:'#000000', shininess:0})
);
powerLed.position.set(0.52, -0.37, 0.29);
powerLed.name = 'powerLed';
tvGroup.add(powerLed);

const brandLabel = new THREE.Mesh(
  new THREE.PlaneGeometry(0.1, 0.03),
  new THREE.MeshBasicMaterial({color:'#ff9d20', transparent:true, opacity:0.35})
);
brandLabel.position.set(0, -0.38, 0.31);
tvGroup.add(brandLabel);

// ── Antenna ──
const antennaGroup = new THREE.Group();
antennaGroup.position.set(0, 0.42, 0);
tvGroup.add(antennaGroup);

const poleMat = new THREE.MeshPhongMaterial({color:'#999999', specular:'#cccccc', shininess:60});
const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.015, 0.18, 8), poleMat);
pole.position.y = 0.09;
antennaGroup.add(pole);

for (let angle of [-0.45, 0.45]) {
  const rodGroup = new THREE.Group();
  rodGroup.position.y = 0.18;
  rodGroup.rotation.z = angle;
  const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.01, 0.25, 8), poleMat);
  rod.position.y = 0.1;
  rodGroup.add(rod);
  antennaGroup.add(rodGroup);
  const tip = new THREE.Mesh(
    new THREE.SphereGeometry(0.015, 8, 8),
    new THREE.MeshPhongMaterial({color:'#dddddd', specular:'#ffffff', shininess:80,
      emissive:'#444444', emissiveIntensity:0.3})
  );
  tip.position.y = 0.23;
  rodGroup.add(tip);
}

// ── TV legs ──
for (let lx of [-0.18, 0.18]) {
  const leg = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 0.06, 0.1),
    new THREE.MeshPhongMaterial({color:'#3a3028', specular:'#111111', shininess:5})
  );
  leg.position.set(lx, -0.43, 0.08);
  tvGroup.add(leg);
}

// ============================================================
// POST-PROCESSING — Bloom only (phosphor glow)
// CRT scanline/noise/vignette are CSS-only on the DOM overlay
// ============================================================
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.0, 0.5, 0.35
);
bloomPass.renderToScreen = true;
composer.addPass(bloomPass);

// ============================================================
// SCREEN OVERLAY POSITIONING
// ============================================================
const tvScreenOverlay = document.getElementById('tvScreenOverlay');

function updateScreenOverlay() {
  const screenCenter = new THREE.Vector3(0, 0, 0.302);
  tvGroup.localToWorld(screenCenter);
  const screenTop = new THREE.Vector3(0, 0.27, 0.302);
  tvGroup.localToWorld(screenTop);

  screenCenter.project(camera);
  screenTop.project(camera);

  const cx = (screenCenter.x * 0.5 + 0.5) * window.innerWidth;
  const cy = (-screenCenter.y * 0.5 + 0.5) * window.innerHeight;
  const ty = (-screenTop.y * 0.5 + 0.5) * window.innerHeight;

  const screenH = Math.abs(ty - cy) * 2.0;
  const screenW = screenH * (4.0 / 3.0);

  tvScreenOverlay.style.left = (cx - screenW/2) + 'px';
  tvScreenOverlay.style.top = (cy - screenH/2) + 'px';
  tvScreenOverlay.style.width = screenW + 'px';
  tvScreenOverlay.style.height = screenH + 'px';
}

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}
function noiseBuf(dur) {
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr*dur, sr);
  const d = buf.getChannelData(0);
  for (let i=0; i<d.length; i++) d[i] = Math.random()*2-1;
  return buf;
}
function playSnowBurst() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const s = audioCtx.createBufferSource();
  s.buffer = noiseBuf(0.35);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  const f = audioCtx.createBiquadFilter();
  f.type="bandpass"; f.frequency.setValueAtTime(3000,t); f.Q.setValueAtTime(0.5,t);
  s.connect(f); f.connect(g); g.connect(audioCtx.destination);
  s.start(t); s.stop(t+0.35);
}
function playClick() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  o.type="square"; o.frequency.setValueAtTime(800,t); o.frequency.linearRampToValueAtTime(200,t+0.04);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+0.06);
}
function playBootHum() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  o.type="sawtooth"; o.frequency.setValueAtTime(50,t); o.frequency.linearRampToValueAtTime(15000,t+1.8);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.2,t); g.gain.linearRampToValueAtTime(0.4,t+0.8);
  g.gain.linearRampToValueAtTime(0.3,t+1.2); g.gain.exponentialRampToValueAtTime(0.001,t+2.2);
  const f = audioCtx.createBiquadFilter();
  f.type="lowpass"; f.frequency.setValueAtTime(200,t); f.frequency.linearRampToValueAtTime(8000,t+1.8);
  o.connect(f); f.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+2.2);
}
function playPowerToggle(on) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  if (on) { o.type="sine"; o.frequency.setValueAtTime(60,t); o.frequency.linearRampToValueAtTime(15000,t+0.5); }
  else { o.type="sine"; o.frequency.setValueAtTime(15000,t); o.frequency.exponentialRampToValueAtTime(30,t+0.3); }
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+(on?0.8:0.5));
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+(on?0.8:0.5));
}

function triggerSnowTransition() {
  initAudio();
  const snow = document.getElementById('snowOverlay');
  snow.classList.remove('active');
  void snow.offsetWidth;
  snow.classList.add('active');
  playSnowBurst();
  playClick();
}

function showNoSignal() {
  document.getElementById('noSignalOverlay').classList.add('visible');
  document.getElementById('npVideo').innerHTML = '';
  document.getElementById('npPreload').innerHTML = '';
}
function hideNoSignal() {
  document.getElementById('noSignalOverlay').classList.remove('visible');
}

function updateChannelInfo(chDef, anim) {
  document.getElementById('channelWatermark').textContent = 'CH ' + currentChannel + ' ' + (chDef?chDef.label:'');
  if (anim) {
    document.getElementById('npChannelNum').textContent = 'CH ' + currentChannel;
    document.getElementById('npTitle').textContent = anim.title;
    document.getElementById('npYear').textContent = anim.year + ' · ' + anim.country;
    const badge = document.getElementById('npBadge');
    badge.textContent = anim.type === 'domestic' ? '国产' : '引进';
    badge.style.color = anim.type === 'domestic' ? '#4da6ff' : '#ff7c3a';
    badge.style.border = '1px solid ' + (anim.type === 'domestic' ? 'rgba(77,166,255,.3)' : 'rgba(255,124,58,.3)');
  } else {
    document.getElementById('npTitle').textContent = chDef ? chDef.label : '';
    document.getElementById('npYear').textContent = '';
    document.getElementById('npBadge').textContent = '';
  }
}

function preloadAndPlay(anim, chDef) {
  currentAnim = anim;
  updateChannelInfo(chDef, anim);
  hideNoSignal();

  const npVideo = document.getElementById('npVideo');
  const npPreload = document.getElementById('npPreload');
  let vidUrl = anim.videoUrl.trim();
  vidUrl = vidUrl.replace('autoplay=0','autoplay=1');
  if (!vidUrl.includes('danmaku=')) vidUrl += '&danmaku=0';
  if (!vidUrl.includes('t=')) vidUrl += '&t=2';

  npPreload.innerHTML = '<iframe src="'+vidUrl+'" allowfullscreen allow="autoplay"></iframe>';
  npPreload.style.visibility = 'hidden';

  setTimeout(() => {
    npVideo.innerHTML = npPreload.innerHTML;
    npPreload.innerHTML = '';
    if (loopTimer) clearInterval(loopTimer);
    loopTimer = setInterval(() => {
      if (currentAnim === anim) {
        npVideo.innerHTML = '<iframe src="'+vidUrl+'" allowfullscreen allow="autoplay"></iframe>';
      }
    }, 18*60*1000);
  }, 650);
}

function tuneToChannel(chNum) {
  currentChannel = chNum;
  const chDef = CHANNELS.find(c => c.num === chNum) || CHANNELS[0];
  if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }

  triggerSnowTransition();

  if (chNum === 6) { showNoSignal(); updateChannelInfo(chDef, null); currentAnim = null; return; }
  if (chNum === 7) { const hlw = animations.find(a => a.id === 7); if (hlw) { preloadAndPlay(hlw, chDef); return; } }

  let pool;
  switch (chDef.bias) {
    case 'domestic': pool = animations.filter(a => a.type === 'domestic'); break;
    case 'imported': pool = animations.filter(a => a.type === 'imported'); break;
    case '80年代': pool = animations.filter(a => a.era === '80年代'); break;
    case 'feature': pool = animations.filter(a => a.year >= 1990); break;
    case 'holiday': pool = animations.filter(a => a.type === 'domestic'); break;
    default: pool = animations;
  }

  pool = pool.filter(a => a.videoUrl && a.videoUrl.trim());
  if (pool.length === 0) { showNoSignal(); updateChannelInfo(chDef, null); currentAnim = null; return; }

  const filtered = pool.filter(a => a !== currentAnim);
  const pick = (filtered.length > 0 ? filtered : pool)[Math.floor(Math.random() * (filtered.length > 0 ? filtered.length : pool.length))];
  if (pick) preloadAndPlay(pick, chDef);
}

function changeChannel(dir) {
  let next = currentChannel + dir;
  if (next > 8) next = 1;
  if (next < 1) next = 8;
  tuneToChannel(next);
}

// KNOB RAYCASTING
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
let prevMouseY = 0;
let dragAccum = 0;

function getIntersection(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObjects([knobBase, knobGrip], true);
}

let knobClickStart = 0;

window.addEventListener('mousedown', (e) => {
  const hits = getIntersection(e);
  if (hits.length > 0) {
    isDragging = true; prevMouseY = e.clientY; dragAccum = 0;
    knobClickStart = performance.now();
    document.body.style.cursor = 'grabbing';
    e.preventDefault();
  }
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) {
    const hits = getIntersection(e);
    document.getElementById('customCursor').classList.toggle('hovering', hits.length > 0);
    return;
  }
  const dy = prevMouseY - e.clientY;
  dragAccum += dy; prevMouseY = e.clientY;
  if (Math.abs(dragAccum) >= 30) {
    const dir = dragAccum > 0 ? 1 : -1; dragAccum = 0;
    changeChannel(dir);
    knobAngle += dir * 45;
    knobGroup.rotation.z = THREE.MathUtils.degToRad(knobAngle);
  }
});

window.addEventListener('mouseup', () => {
  if (isDragging && performance.now() - knobClickStart < 200 && Math.abs(dragAccum) < 8) {
    initAudio(); playClick(); tuneToChannel(currentChannel);
  }
  isDragging = false; document.body.style.cursor = '';
});

// Touch support
window.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects([knobBase, knobGrip], true);
    if (hits.length > 0) { isDragging = true; prevMouseY = e.touches[0].clientY; dragAccum = 0; e.preventDefault(); }
  }
}, {passive: false});

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const dy = prevMouseY - e.touches[0].clientY;
  dragAccum += dy; prevMouseY = e.touches[0].clientY;
  if (Math.abs(dragAccum) >= 30) {
    const dir = dragAccum > 0 ? 1 : -1; dragAccum = 0;
    changeChannel(dir);
    knobAngle += dir * 45;
    knobGroup.rotation.z = THREE.MathUtils.degToRad(knobAngle);
  }
  e.preventDefault();
}, {passive: false});

window.addEventListener('touchend', () => { isDragging = false; });

// Keyboard
window.addEventListener('keydown', (e) => {
  if (document.getElementById('modalOverlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
    e.preventDefault(); initAudio(); playClick();
    changeChannel(1); knobAngle += 45;
    knobGroup.rotation.z = THREE.MathUtils.degToRad(knobAngle);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
    e.preventDefault(); initAudio(); playClick();
    changeChannel(-1); knobAngle -= 45;
    knobGroup.rotation.z = THREE.MathUtils.degToRad(knobAngle);
  }
});

// ============================================================
// MODAL
// ============================================================
const modalOverlay = document.getElementById('modalOverlay');
const modalBody = document.getElementById('modalBody');

function openModal(id) {
  const anim = animations.find(a => a.id === id);
  if (!anim) return;
  const typeLabel = anim.type === 'domestic' ? '国产' : '引进';
  let vidHTML = '';
  if (anim.videoUrl && anim.videoUrl.trim()) {
    let mu = anim.videoUrl.replace('autoplay=0','autoplay=1');
    if (!mu.includes('danmaku=')) mu += '&danmaku=0';
    if (!mu.includes('t=')) mu += '&t=2';
    vidHTML = '<div class="video-wrap"><iframe src="'+mu+'" allowfullscreen allow="autoplay"></iframe></div>';
  }
  let charsHTML = (anim.characters||[]).map(c =>
    '<div style="background:rgba(10,8,2,.9);border:1px solid rgba(238,153,32,.2);border-radius:4px;padding:10px;margin-bottom:8px"><div style="font-size:.75rem;color:#ff9d20;font-weight:bold;margin-bottom:4px">'+c.name+'</div><div style="font-size:.65rem;color:#ffe8c8">'+c.desc+'</div></div>'
  ).join('');

  modalBody.innerHTML =
    '<div class="modal-title">'+anim.title+'</div>'+
    '<div style="font-size:.6rem;color:#998870;margin-bottom:2px">'+anim.titleEn+'</div>'+
    '<div class="modal-meta"><span>'+anim.year+'</span><span style="color:'+(anim.type==='domestic'?'#4da6ff':'#ff7c3a')+'">'+typeLabel+'</span><span>'+anim.country+'</span></div>'+
    '<div class="modal-tabs"><button class="modal-tab" data-pane="video">经典片段</button><button class="modal-tab active" data-pane="synopsis">故事简介</button><button class="modal-tab" data-pane="characters">主角介绍</button></div>'+
    '<div class="modal-pane" data-pane="video">'+vidHTML+'</div>'+
    '<div class="modal-pane active" data-pane="synopsis"><p>'+anim.synopsis+'</p></div>'+
    '<div class="modal-pane" data-pane="characters">'+charsHTML+'</div>';

  modalBody.querySelectorAll('.modal-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      const pane = this.dataset.pane;
      modalBody.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
      modalBody.querySelectorAll('.modal-pane').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      modalBody.querySelector('.modal-pane[data-pane="'+pane+'"]').classList.add('active');
    });
  });
  modalOverlay.classList.add('open');
}

function closeModal() { modalOverlay.classList.remove('open'); modalBody.innerHTML = ''; }
document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal();
});

document.getElementById('tvScreenOverlay').addEventListener('click', (e) => {
  if (e.target.closest('#modalOverlay') || e.target.closest('#newspaper') ||
      e.target.closest('#npInfo') || isDragging) return;
  if (currentAnim) openModal(currentAnim.id);
});

// ============================================================
// NEWSPAPER
// ============================================================
function renderNewspaper() {
  const grid = document.getElementById('npGrid');
  grid.innerHTML = programGuide.map(item =>
    '<div class="np-item" data-anim-id="'+(item.animId||'')+'"><span class="np-time">'+item.time+'</span>'+item.title+'</div>'
  ).join('');
  grid.querySelectorAll('.np-item').forEach(item => {
    item.addEventListener('click', () => { const aid = parseInt(item.dataset.animId); if (aid) openModal(aid); });
  });
}
document.getElementById('tvScreenOverlay').addEventListener('dblclick', (e) => {
  if (e.target.closest('#modalOverlay')) return;
  document.getElementById('newspaper').classList.toggle('visible');
});

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  document.getElementById('screenClock').textContent =
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}

// ============================================================
// CUSTOM CURSOR
// ============================================================
const cursorEl = document.getElementById('customCursor');
const cursorDot = document.getElementById('cursorDot');
document.addEventListener('mousemove', (e) => {
  cursorEl.style.left = e.clientX+'px'; cursorEl.style.top = e.clientY+'px';
  cursorDot.style.left = e.clientX+'px'; cursorDot.style.top = e.clientY+'px';
});
document.addEventListener('mouseleave', () => { cursorEl.style.opacity='0'; cursorDot.style.opacity='0'; });
document.addEventListener('mouseenter', () => { cursorEl.style.opacity='1'; cursorDot.style.opacity='1'; });
document.getElementById('tvScreenOverlay').addEventListener('mouseenter', () => {
  cursorEl.style.opacity='0'; cursorDot.style.opacity='0';
});
document.getElementById('tvScreenOverlay').addEventListener('mouseleave', () => {
  cursorEl.style.opacity='1'; cursorDot.style.opacity='1';
});

// ============================================================
// POWER
// ============================================================
powerLed.userData = { on: true };
tvScreen.userData = { powered: true };

window.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(powerLed);
  if (hits.length > 0 && !isDragging && !modalOverlay.classList.contains('open')) {
    initAudio();
    const isOn = powerLed.userData.on;
    powerLed.userData.on = !isOn;
    tvScreen.userData.powered = !isOn;
    powerLed.material.color.set(isOn ? '#440000' : '#00ff00');
    powerLed.material.emissive.set(isOn ? '#220000' : '#00ff00');
    powerLed.material.emissiveIntensity = isOn ? 0.3 : 3;
    screenMat.emissiveIntensity = isOn ? 0.01 : 0.5;
    playPowerToggle(!isOn);
    if (isOn) {
      document.getElementById('npVideo').innerHTML = '';
      document.getElementById('npPreload').innerHTML = '';
      currentAnim = null;
      if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
    } else { tuneToChannel(currentChannel); }
  }
});

// ============================================================
// BOOT SEQUENCE
// ============================================================
window.addEventListener('load', () => {
  const bootOverlay = document.getElementById('bootOverlay');
  const bootText = document.getElementById('bootText');
  const bootSub = document.getElementById('bootSub');
  initAudio(); playBootHum();
  setTimeout(() => { bootText.classList.add('show'); }, 1600);
  setTimeout(() => { bootSub.classList.add('show'); }, 2500);
  setTimeout(() => { bootOverlay.classList.add('hidden'); initTV(); }, 3600);
});

function initTV() {
  tuneToChannel(2);
  updateClock();
  setInterval(updateClock, 30000);
  renderNewspaper();
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  composer.setSize(window.innerWidth, window.innerHeight);
  updateScreenOverlay();
});

// ============================================================
// RENDER LOOP
// ============================================================
function animate(time) {
  requestAnimationFrame(animate);
  const breathe = 1 + Math.sin(time * 0.0008) * 0.12;
  tvGlow.intensity = 30 * breathe;
  bloomPass.strength = 1.0 * breathe;
  composer.render();
  updateScreenOverlay();
}

updateScreenOverlay();
requestAnimationFrame(animate);
</script>
</body>
</html>
